<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast from Bali 🌴</title>
    <!-- Funky pixel font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>🌴 Podcast from Bali 🌴</h1>
        <p>Turn on volume & wait for the vibe!</p>
        <button id="start-btn">Let's Go! 😺</button>
    </div>

    <!-- Hidden YouTube Player -->
    <div id="player-container">
        <div id="youtube-player"></div>
    </div>

    <div id="main-content" class="hidden">
        <div id="lyrics-container">
            <h2 id="lyrics">🎵 Let the vibe begin... 🎵</h2>
        </div>
        
        <!-- Animated 3D/Pixel Cat Gifs using CSS Emojis! -->
        <div class="cat cat-1">🐱</div>
        <div class="cat cat-2">😸</div>
        <div class="cat cat-3">😹</div>
        <div class="cat cat-4">😻</div>
        <div class="cat cat-5">😼</div>
        <div class="cat cat-6">😽</div>
        <div class="cat cat-7">🙀</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
