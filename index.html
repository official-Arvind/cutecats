<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast from Bali 🌴😺</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>🌴 Podcast from Bali 🌴</h1>
        <p>Turn on your sound & get ready to groove!</p>
        <button id="start-btn">Tap to Play! 😺</button>
    </div>

    <!-- Hidden audio element for the music -->
    <!-- You can replace the src with your actual "podcast-from-bali.mp3" file if you have one! -->
    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" loop></audio>

    <div id="main-content" class="hidden">
        <div id="lyrics-container">
            <h2 id="lyrics">🎵 Welcome to the vibe! 🎵</h2>
        </div>
        
        <!-- Cat Elements -->
        <div class="cat cat-1">🐱</div>
        <div class="cat cat-2">😸</div>
        <div class="cat cat-3">😹</div>
        <div class="cat cat-4">😻</div>
        <div class="cat cat-5">😼</div>
        <div class="cat cat-6">😽</div>
        <div class="cat cat-7">🙀</div>
        <div class="cat cat-8">😿</div>
        <div class="cat cat-9">😾</div>
        <div class="cat cat-10">🐈</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
